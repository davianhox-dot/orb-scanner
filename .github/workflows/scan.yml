name: Pre-Market Scan

on:
  schedule:
    - cron: "*/5 11-14 * * 1-5"
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check schedule
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — running regardless of current time."
          else
            SLOT=$(python -c "from cloud.config import get_settings, current_scan_slot; print(current_scan_slot(get_settings()) or '')")
            if [ -n "$SLOT" ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "Within scan window: $SLOT"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "Not within a scan window right now — skipping."
            fi
          fi

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: pip install -r cloud/requirements.txt

      - name: Run scan
        if: steps.check.outputs.should_run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER || 'polygon' }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python -m cloud.run_scan --force
